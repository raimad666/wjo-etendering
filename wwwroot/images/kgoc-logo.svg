<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240">
  <defs>
    <linearGradient id="sailGlow" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#c0e8f8"/>
      <stop offset="45%" stop-color="#70c0e8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2d9fd8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tearShine" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#55b8e0"/>
      <stop offset="60%" stop-color="#c0e8f8" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Black swoosh arc — outside/below the oval -->
  <path d="M 25,195 C 45,238 118,255 200,205"
        fill="none" stroke="#111" stroke-width="13" stroke-linecap="round"/>

  <!-- Blue oval (slightly tilted via transform) -->
  <ellipse cx="108" cy="115" rx="86" ry="102" fill="#2d9fd8" transform="rotate(-8 108 115)"/>

  <!-- White sail shape: right side follows oval, left side is a gentle inward curve -->
  <path d="
    M 116,18
    C 152,24  175,62  174,108
    C 173,150 156,180 132,194
    C 116,202  98,198  88,186
    C 100,174  116,152 120,122
    C 124,90   118,54  102,34
    C 107,24   112,17  116,18 Z
  " fill="white"/>

  <!-- Gradient glow reflection on left edge of sail -->
  <path d="
    M 102,34
    C  86,52  78,82   82,112
    C  85,138  98,160 114,172
    C  98,158  86,132  84,106
    C  82,78   92,50  106,36 Z
  " fill="url(#sailGlow)"/>

  <!-- Blue teardrop at bottom of the sail -->
  <path d="
    M 88,186
    C  98,172 120,166 146,174
    C 166,180 174,196 164,208
    C 154,220 130,222 110,214
    C  90,206  82,200  88,186 Z
  " fill="#2d9fd8"/>

  <!-- Teardrop highlight -->
  <path d="M 110,172 C 132,170 152,178 156,186 C 140,179 122,175 110,172 Z"
        fill="white" opacity="0.4"/>
</svg>
